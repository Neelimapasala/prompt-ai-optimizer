<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt AI Optimizer - Professional Prompt Engineering Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes ripple {
            0% { transform: scale(0); opacity: 0.5; }
            100% { transform: scale(4); opacity: 0; }
        }
        
        .animate-gradient { background-size: 200% 200%; animation: gradient 3s ease infinite; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-slide-in { animation: slideIn 0.5s ease-out; }
        .animate-pulse-slow { animation: pulse 3s ease-in-out infinite; }
        .animate-rotate { animation: rotate 20s linear infinite; }
        
        .glass-morphism {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-morphism-strong {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .glass-card {
            background: rgba(15, 25, 35, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.5); border-radius: 10px; }
        
        .wallpaper-option {
            transition: all 0.3s ease;
        }
        
        .wallpaper-option:hover {
            transform: scale(1.05);
        }
        
        .wallpaper-option-active {
            ring: 2px solid white;
            transform: scale(1.05);
        }
        
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
            margin: 0 2px;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ==================== LIVE WALLPAPER COMPONENT ====================
        const LiveWallpaper = ({ wallpaperTheme }) => {
            const canvasRef = useRef(null);
            
            // Wallpaper configurations - 8 beautiful live wallpapers
            const wallpapers = {
                neural: {
                    name: 'Neural Network',
                    gradient: ['#1a1a2e', '#16213e', '#0f3460'],
                    particleColor: '#8b5cf6',
                    particleCount: 80,
                    connections: true,
                    circles: true,
                    glow: true
                },
                cosmic: {
                    name: 'Cosmic Space',
                    gradient: ['#0f0c29', '#302b63', '#24243e'],
                    particleColor: '#c084fc',
                    particleCount: 100,
                    connections: true,
                    circles: true,
                    glow: true
                },
                matrix: {
                    name: 'Matrix Code',
                    gradient: ['#0a0f0a', '#0a1f0a', '#003300'],
                    particleColor: '#00ff41',
                    particleCount: 60,
                    connections: true,
                    circles: false,
                    glow: true
                },
                aurora: {
                    name: 'Aurora Borealis',
                    gradient: ['#0f2027', '#203a43', '#2c5364'],
                    particleColor: '#06b6d4',
                    particleCount: 70,
                    connections: true,
                    circles: true,
                    glow: true
                },
                ocean: {
                    name: 'Ocean Deep',
                    gradient: ['#000428', '#004e92', '#000428'],
                    particleColor: '#3b82f6',
                    particleCount: 50,
                    connections: true,
                    circles: false,
                    glow: true
                },
                sunset: {
                    name: 'Sunset Horizon',
                    gradient: ['#ff6b6b', '#feca57', '#ff9ff3'],
                    particleColor: '#ff9f43',
                    particleCount: 90,
                    connections: true,
                    circles: true,
                    glow: true
                },
                forest: {
                    name: 'Mystic Forest',
                    gradient: ['#0b3d0b', '#1a5b1a', '#0b3d0b'],
                    particleColor: '#22c55e',
                    particleCount: 65,
                    connections: true,
                    circles: false,
                    glow: true
                },
                galaxy: {
                    name: 'Galaxy Core',
                    gradient: ['#1e0b2d', '#2d1b4e', '#4a2b7a'],
                    particleColor: '#e879f9',
                    particleCount: 120,
                    connections: true,
                    circles: true,
                    glow: true
                }
            };
            
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                
                const ctx = canvas.getContext('2d');
                let animationId;
                let particles = [];
                let circles = [];
                
                const resizeCanvas = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
                
                const wallpaper = wallpapers[wallpaperTheme] || wallpapers.neural;
                
                // Initialize particles
                for (let i = 0; i < wallpaper.particleCount; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 1.2,
                        vy: (Math.random() - 0.5) * 1.2,
                        size: Math.random() * 3 + 1,
                        alpha: Math.random() * 0.5 + 0.3
                    });
                }
                
                // Initialize floating circles
                for (let i = 0; i < 5; i++) {
                    circles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        radius: 50 + Math.random() * 100,
                        speed: 0.002 + Math.random() * 0.003,
                        angle: Math.random() * Math.PI * 2
                    });
                }
                
                let time = 0;
                
                const drawGradient = () => {
                    const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    grad.addColorStop(0, wallpaper.gradient[0]);
                    grad.addColorStop(0.5, wallpaper.gradient[1]);
                    grad.addColorStop(1, wallpaper.gradient[2]);
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                };
                
                const drawParticles = () => {
                    particles.forEach((p, i) => {
                        p.x += p.vx;
                        p.y += p.vy;
                        
                        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                        
                        // Glow effect
                        if (wallpaper.glow) {
                            ctx.shadowBlur = 12;
                            ctx.shadowColor = wallpaper.particleColor;
                        }
                        
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fillStyle = wallpaper.particleColor;
                        ctx.globalAlpha = p.alpha;
                        ctx.fill();
                        
                        // Draw connections between nearby particles
                        if (wallpaper.connections) {
                            for (let j = i + 1; j < particles.length; j++) {
                                const dx = p.x - particles[j].x;
                                const dy = p.y - particles[j].y;
                                const dist = Math.sqrt(dx * dx + dy * dy);
                                if (dist < 120) {
                                    ctx.beginPath();
                                    ctx.moveTo(p.x, p.y);
                                    ctx.lineTo(particles[j].x, particles[j].y);
                                    ctx.strokeStyle = wallpaper.particleColor;
                                    ctx.globalAlpha = 0.08 * (1 - dist / 120);
                                    ctx.lineWidth = 0.8;
                                    ctx.stroke();
                                }
                            }
                        }
                    });
                };
                
                const drawCircles = () => {
                    if (!wallpaper.circles) return;
                    
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    
                    for (let i = 0; i < 4; i++) {
                        const radius = 120 + i * 90 + Math.sin(time * 0.5 + i) * 30;
                        ctx.beginPath();
                        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                        ctx.strokeStyle = wallpaper.particleColor;
                        ctx.globalAlpha = 0.12;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        
                        // Rotating circles
                        const rotRadius = 180 + i * 40;
                        const rotX = centerX + Math.cos(time * 0.3 + i) * rotRadius;
                        const rotY = centerY + Math.sin(time * 0.3 + i) * rotRadius;
                        ctx.beginPath();
                        ctx.arc(rotX, rotY, 15 + i * 5, 0, Math.PI * 2);
                        ctx.fillStyle = wallpaper.particleColor;
                        ctx.globalAlpha = 0.15;
                        ctx.fill();
                    }
                };
                
                const drawRipples = () => {
                    const rippleTime = Date.now() * 0.002;
                    for (let i = 0; i < 3; i++) {
                        const rippleX = canvas.width * (0.3 + Math.sin(rippleTime + i) * 0.1);
                        const rippleY = canvas.height * (0.5 + Math.cos(rippleTime * 0.8 + i) * 0.1);
                        ctx.beginPath();
                        ctx.arc(rippleX, rippleY, 30 + Math.sin(rippleTime * 2) * 20, 0, Math.PI * 2);
                        ctx.fillStyle = wallpaper.particleColor;
                        ctx.globalAlpha = 0.05;
                        ctx.fill();
                    }
                };
                
                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                    
                    drawGradient();
                    drawParticles();
                    drawCircles();
                    drawRipples();
                    
                    time += 0.02;
                    animationId = requestAnimationFrame(animate);
                };
                
                animate();
                
                return () => {
                    window.removeEventListener('resize', resizeCanvas);
                    if (animationId) cancelAnimationFrame(animationId);
                };
            }, [wallpaperTheme]);
            
            return <canvas ref={canvasRef} className="fixed inset-0 z-0" style={{ opacity: 0.85 }} />;
        };
        
        // ==================== MAIN APP COMPONENT ====================
        const App = () => {
            // State Management
            const [currentPage, setCurrentPage] = useState('home');
            const [roughPrompt, setRoughPrompt] = useState('');
            const [refinedPrompt, setRefinedPrompt] = useState('');
            const [isRefining, setIsRefining] = useState(false);
            const [copiedField, setCopiedField] = useState(null);
            const [selectedDomain, setSelectedDomain] = useState('creative');
            const [history, setHistory] = useState([]);
            const [qualityScore, setQualityScore] = useState(0);
            const [detectedDomain, setDetectedDomain] = useState('');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [chatMessages, setChatMessages] = useState([]);
            const [chatInput, setChatInput] = useState('');
            const [showChat, setShowChat] = useState(false);
            const [chatLoading, setChatLoading] = useState(false);
            const [showWallpaperPicker, setShowWallpaperPicker] = useState(false);
            const [wallpaperTheme, setWallpaperTheme] = useState('neural');
            const [showSettings, setShowSettings] = useState(false);
            const [temperature, setTemperature] = useState(0.7);
            const [maxTokens, setMaxTokens] = useState(500);
            const [stats, setStats] = useState({ processed: 0, savedTime: 0, avgQuality: 0 });
            const [favorites, setFavorites] = useState([]);
            const [showFavorites, setShowFavorites] = useState(false);
            const [exportFormat, setExportFormat] = useState('text');
            const [notification, setNotification] = useState(null);
            const [activeTab, setActiveTab] = useState('optimize');
            const [wordCount, setWordCount] = useState(0);
            const [charCount, setCharCount] = useState(0);
            
            const chatEndRef = useRef(null);
            const refinedPromptRef = useRef(null);
            
            // Wallpaper options
            const wallpaperOptions = {
                neural: { name: 'Neural Network', icon: 'fa-brain', color: '#8b5cf6', description: 'Abstract neural connections' },
                cosmic: { name: 'Cosmic Space', icon: 'fa-meteor', color: '#c084fc', description: 'Deep space particles' },
                matrix: { name: 'Matrix Code', icon: 'fa-code', color: '#00ff41', description: 'Digital rain effect' },
                aurora: { name: 'Aurora', icon: 'fa-snowflake', color: '#06b6d4', description: 'Northern lights' },
                ocean: { name: 'Ocean Deep', icon: 'fa-water', color: '#3b82f6', description: 'Underwater atmosphere' },
                sunset: { name: 'Sunset', icon: 'fa-sun', color: '#ff9f43', description: 'Warm horizon glow' },
                forest: { name: 'Forest', icon: 'fa-tree', color: '#22c55e', description: 'Mystic woodland' },
                galaxy: { name: 'Galaxy', icon: 'fa-galaxy', color: '#e879f9', description: 'Starry cosmic core' }
            };
            
            // Domains Data
            const domains = [
                { id: 'creative', name: 'Creative Writing', emoji: '✨', icon: 'fa-feather-alt', color: 'from-purple-600 to-pink-600', description: 'Poetry, stories, scripts, and creative content' },
                { id: 'code', name: 'Code Generation', emoji: '💻', icon: 'fa-code', color: 'from-blue-600 to-cyan-600', description: 'Programming, algorithms, and technical solutions' },
                { id: 'business', name: 'Business', emoji: '📊', icon: 'fa-chart-line', color: 'from-emerald-600 to-teal-600', description: 'Strategy, proposals, and market analysis' },
                { id: 'research', name: 'Research', emoji: '🔬', icon: 'fa-flask', color: 'from-orange-600 to-red-600', description: 'Academic papers, studies, and analysis' },
                { id: 'education', name: 'Education', emoji: '📚', icon: 'fa-graduation-cap', color: 'from-indigo-600 to-blue-600', description: 'Lessons, tutorials, and learning materials' },
                { id: 'technical', name: 'Technical', emoji: '⚙️', icon: 'fa-cogs', color: 'from-slate-600 to-slate-500', description: 'API docs, system design, and architecture' },
                { id: 'marketing', name: 'Marketing', emoji: '📢', icon: 'fa-bullhorn', color: 'from-rose-600 to-orange-600', description: 'Ads, campaigns, and social media content' },
                { id: 'legal', name: 'Legal', emoji: '⚖️', icon: 'fa-gavel', color: 'from-amber-600 to-yellow-600', description: 'Contracts, policies, and legal documents' }
            ];
            
            // Templates Library
            const templates = [
                { id: 1, name: 'Blog Post Outline', category: 'writing', prompt: 'Create a detailed blog post outline about [topic] including introduction, 5 main points with subpoints, and conclusion' },
                { id: 2, name: 'React Component', category: 'code', prompt: 'Create a React functional component for [feature] with props, state management, and error handling' },
                { id: 3, name: 'Business Proposal', category: 'business', prompt: 'Write a business proposal for [project] including executive summary, objectives, timeline, and budget' },
                { id: 4, name: 'Study Guide', category: 'education', prompt: 'Create a comprehensive study guide for [subject] with key concepts, examples, and practice questions' },
                { id: 5, name: 'Email Campaign', category: 'marketing', prompt: 'Write an email sequence for [product/service] including welcome email, follow-ups, and call-to-action' },
                { id: 6, name: 'API Documentation', category: 'technical', prompt: 'Create API documentation for [endpoint] including request/response examples, error codes, and authentication' },
                { id: 7, name: 'Research Paper', category: 'research', prompt: 'Write a research paper abstract on [topic] including hypothesis, methodology, and expected results' },
                { id: 8, name: 'Legal Contract', category: 'legal', prompt: 'Draft a legal contract for [purpose] including terms, conditions, and dispute resolution clauses' }
            ];
            
            // Detection Patterns
            const detectionPatterns = {
                creative: ['poem', 'story', 'write', 'creative', 'character', 'plot', 'dialogue', 'narrative', 'fiction', 'novel'],
                code: ['code', 'function', 'script', 'program', 'algorithm', 'javascript', 'python', 'react', 'api', 'component'],
                business: ['business', 'strategy', 'plan', 'proposal', 'market', 'revenue', 'analysis', 'roi', 'forecast'],
                research: ['research', 'study', 'analyze', 'hypothesis', 'experiment', 'data', 'methodology', 'findings'],
                education: ['teach', 'explain', 'tutorial', 'learn', 'student', 'course', 'lesson', 'guide', 'curriculum'],
                technical: ['technical', 'api', 'database', 'system', 'architecture', 'deploy', 'server', 'infrastructure'],
                marketing: ['marketing', 'ad', 'campaign', 'social media', 'promote', 'brand', 'audience', 'conversion'],
                legal: ['legal', 'contract', 'policy', 'terms', 'agreement', 'compliance', 'law', 'regulation']
            };
            
            // Domain Specific Prompts
            const domainPrompts = {
                creative: { structure: 'Include narrative arc, character development, and emotional resonance', style: 'Use vivid imagery, dialogue, and sensory details', quality: 'Ensure originality, consistency, and engagement' },
                code: { structure: 'Include function signature, documentation, error handling, and examples', style: 'Follow best practices, use meaningful names', quality: 'Include unit tests and performance considerations' },
                business: { structure: 'Include executive summary, metrics, timeline, and actionable insights', style: 'Use professional tone with data-driven language', quality: 'Ensure clarity, feasibility, and measurable outcomes' },
                research: { structure: 'Include hypothesis, methodology, results, discussion, and conclusions', style: 'Use academic language with citations', quality: 'Ensure validity, reliability, and peer-review standards' },
                education: { structure: 'Include learning objectives, explanations, examples, exercises, and assessment', style: 'Use clear, age-appropriate language', quality: 'Ensure engagement, comprehension, and retention' },
                technical: { structure: 'Include specifications, architecture, dependencies, deployment, and security', style: 'Use precise technical terminology', quality: 'Add scalability, maintainability, and best practices' },
                marketing: { structure: 'Include target audience, value proposition, channels, metrics, and budget', style: 'Use persuasive, benefit-driven language', quality: 'Ensure ROI focus and conversion optimization' },
                legal: { structure: 'Include definitions, obligations, rights, limitations, and signatures', style: 'Use precise, unambiguous legal language', quality: 'Ensure compliance, clarity, and enforceability' }
            };
            
            // Effects
            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [chatMessages]);
            
            useEffect(() => {
                if (refinedPromptRef.current && refinedPrompt) {
                    refinedPromptRef.current.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }, [refinedPrompt]);
            
            useEffect(() => {
                setWordCount(roughPrompt.split(/\s+/).filter(w => w.length > 0).length);
                setCharCount(roughPrompt.length);
            }, [roughPrompt]);
            
            // Helper Functions
            const showNotification = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 3000);
            };
            
            const detectDomain = (text) => {
                const lowerText = text.toLowerCase();
                let scores = {};
                Object.entries(detectionPatterns).forEach(([domain, patterns]) => {
                    scores[domain] = patterns.filter(pattern => lowerText.includes(pattern)).length;
                });
                return Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b, 'creative');
            };
            
            const calculateQuality = (prompt) => {
                let score = 0;
                const checks = {
                    length: prompt.length > 100,
                    clarity: prompt.split('.').length > 2,
                    structure: /[,;:\-?!]/.test(prompt),
                    context: /context|example|format|output|style|tone|specific|audience/.test(prompt.toLowerCase()),
                    specificity: /specific|exactly|ensure|include|add|must|should/.test(prompt.toLowerCase()),
                    action: /create|write|generate|build|design|develop|analyze/.test(prompt.toLowerCase())
                };
                Object.values(checks).forEach(check => { if (check) score += 16.67; });
                return Math.min(Math.round(score), 100);
            };
            
            const refinePrompt = async () => {
                if (!roughPrompt.trim()) {
                    showNotification('Please enter a prompt first', 'error');
                    return;
                }
                
                setIsRefining(true);
                const detected = detectDomain(roughPrompt);
                setDetectedDomain(detected);
                setSelectedDomain(detected);
                
                setTimeout(() => {
                    const domainData = domainPrompts[detected];
                    const refined = `${roughPrompt.trim()}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
🎯 DOMAIN: ${domains.find(d => d.id === detected)?.name} (Auto-Detected)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

📋 STRUCTURE & REQUIREMENTS:
${domainData.structure}

🎨 STYLE GUIDELINES:
${domainData.style}

⭐ QUALITY STANDARDS:
${domainData.quality}

💡 ADDITIONAL OPTIMIZATIONS:
• Add concrete examples for clarity
• Specify expected output format
• Define success criteria
• Include relevant constraints
• Mention target audience expertise
• Add tone modifiers

🔧 TECHNICAL PARAMETERS:
• Temperature: ${temperature}
• Max Tokens: ${maxTokens}
• Format: ${exportFormat.toUpperCase()}

✨ OPTIMIZATION TIPS:
1. Be specific about your desired outcome
2. Provide context and background information
3. Define the intended audience
4. Specify the output format
5. Include examples if possible
6. Set clear constraints

📊 QUALITY METRICS:
• Clarity: High
• Specificity: Optimized
• Structure: Enhanced
• Actionability: Improved

Ready for use! Copy and test with your preferred AI model.`;

                    setRefinedPrompt(refined);
                    const score = calculateQuality(refined);
                    setQualityScore(score);
                    
                    const newHistory = {
                        id: Date.now(),
                        rough: roughPrompt,
                        refined: refined,
                        domain: detected,
                        score: score,
                        timestamp: new Date().toLocaleString()
                    };
                    
                    setHistory(prev => [newHistory, ...prev.slice(0, 19)]);
                    setStats(prev => ({
                        processed: prev.processed + 1,
                        savedTime: prev.savedTime + Math.floor(Math.random() * 20 + 10),
                        avgQuality: Math.round((prev.avgQuality * prev.processed + score) / (prev.processed + 1))
                    }));
                    
                    addChatMessage('assistant', `✅ I've optimized your ${domains.find(d => d.id === detected)?.name} prompt! Quality score: ${score}%. The prompt now includes structure guidelines, style requirements, and quality standards.`);
                    setIsRefining(false);
                    showNotification('Prompt optimized successfully!', 'success');
                }, 2000);
            };
            
            const addChatMessage = (role, content) => {
                setChatMessages(prev => [...prev, { role, content, timestamp: new Date().toLocaleTimeString() }]);
            };
            
            const handleChatSubmit = async () => {
                if (!chatInput.trim()) return;
                
                addChatMessage('user', chatInput);
                setChatInput('');
                setChatLoading(true);
                
                setTimeout(() => {
                    const responses = [
                        `Great question! For ${selectedDomain} domain, focus on being specific and providing context.`,
                        `I can help refine your prompt further. What specific aspect would you like to improve?`,
                        `Current quality score is ${qualityScore}%. To improve, add more specific examples and constraints.`,
                        `Consider adding the output format you want (JSON, text, markdown) for better results.`,
                        `Your prompt looks good! Want me to generate some example variations?`
                    ];
                    addChatMessage('assistant', responses[Math.floor(Math.random() * responses.length)]);
                    setChatLoading(false);
                }, 1000);
            };
            
            const copyToClipboard = async (text, field) => {
                await navigator.clipboard.writeText(text);
                setCopiedField(field);
                showNotification('Copied to clipboard!', 'success');
                setTimeout(() => setCopiedField(null), 2000);
            };
            
            const loadTemplate = (template) => {

                                    <div className="space-y-2 max-h-64 overflow-y-auto custom-scrollbar">
                                        {templates.slice(0, 5).map(template => (
                                            <button key={template.id} onClick={() => loadTemplate(template)} className="w-full text-left p-2 rounded-lg glass-morphism hover:bg-white/10 transition-all text-sm text-slate-300">
                                                <i className={`fas ${template.category === 'code' ? 'fa-code' : template.category === 'business' ? 'fa-chart-line' : template.category === 'education' ? 'fa-graduation-cap' : 'fa-pen'} mr-2`}></i>
                                                {template.name}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="glass-card rounded-xl p-4">
                                    <h3 className="text-white font-semibold mb-3 flex items-center gap-2">
                                        <i className="fas fa-chart-simple text-purple-400"></i> Current Stats
                                    </h3>
                                    <div className="space-y-2 text-sm">
                                        <div className="flex justify-between text-slate-300">
                                            <span>Total Optimized:</span>
                                            <span className="text-white font-semibold">{stats.processed}</span>
                                        </div>
                                        <div className="flex justify-between text-slate-300">
                                            <span>Time Saved:</span>
                                            <span className="text-white font-semibold">{stats.savedTime} min</span>
                                        </div>
                                        <div className="flex justify-between text-slate-300">
                                            <span>Avg Quality:</span>
                                            <span className="text-white font-semibold">{stats.avgQuality}%</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
            
            // Templates Page
            const TemplatesPage = () => (
                <div className="min-h-screen pt-20 pb-12">
                    <div className="container mx-auto px-4">
                        <h1 className="text-3xl font-bold text-white mb-8 text-center">Prompt Templates Library</h1>
                        <p className="text-center text-slate-400 mb-8">Ready-to-use templates to jumpstart your prompt engineering</p>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            {templates.map(template => (
                                <div key={template.id} className="glass-card rounded-xl p-5 hover:scale-105 transition-all cursor-pointer" onClick={() => loadTemplate(template)}>
                                    <div className="w-12 h-12 rounded-xl bg-gradient-to-r from-purple-600 to-pink-600 flex items-center justify-center mb-3">
                                        <i className={`fas ${template.category === 'code' ? 'fa-code' : template.category === 'business' ? 'fa-chart-line' : template.category === 'education' ? 'fa-graduation-cap' : template.category === 'marketing' ? 'fa-bullhorn' : 'fa-pen'} text-white text-xl`}></i>
                                    </div>
                                    <h3 className="text-white font-semibold text-lg mb-2">{template.name}</h3>
                                    <p className="text-slate-400 text-sm mb-3">{template.prompt.substring(0, 80)}...</p>
                                    <span className="text-purple-400 text-sm">Use Template →</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
            
            // Analytics Page
            const AnalyticsPage = () => (
                <div className="min-h-screen pt-20 pb-12">
                    <div className="container mx-auto px-4">
                        <h1 className="text-3xl font-bold text-white mb-8 text-center">Analytics Dashboard</h1>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
                            <div className="glass-card rounded-xl p-6">
                                <h3 className="text-white font-semibold mb-4">Performance Stats</h3>
                                <div className="space-y-3">
                                    <div className="flex justify-between text-slate-300"><span>Total Prompts Processed:</span><span className="text-white font-bold">{stats.processed}</span></div>
                                    <div className="flex justify-between text-slate-300"><span>Total Time Saved:</span><span className="text-white font-bold">{stats.savedTime} minutes</span></div>
                                    <div className="flex justify-between text-slate-300"><span>Average Quality Score:</span><span className="text-white font-bold">{stats.avgQuality}%</span></div>
                                    <div className="flex justify-between text-slate-300"><span>Favorites Saved:</span><span className="text-white font-bold">{favorites.length}</span></div>
                                    <div className="flex justify-between text-slate-300"><span>History Items:</span><span className="text-white font-bold">{history.length}</span></div>
                                </div>
                            </div>
                            <div className="glass-card rounded-xl p-6">
                                <h3 className="text-white font-semibold mb-4">Domain Distribution</h3>
                                <div className="space-y-2">
                                    {domains.map(domain => {
                                        const count = history.filter(h => h.domain === domain.id).length;
                                        return count > 0 && (
                                            <div key={domain.id}>
                                                <div className="flex justify-between text-sm text-slate-300 mb-1">
                                                    <span>{domain.name}</span>
                                                    <span>{count}</span>
                                                </div>
                                                <div className="w-full h-2 bg-slate-700 rounded-full overflow-hidden">
                                                    <div className={`h-full bg-gradient-to-r ${domain.color}`} style={{ width: `${(count / Math.max(history.length, 1)) * 100}%` }}></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {history.length === 0 && <p className="text-slate-400 text-center py-4">No data yet. Optimize some prompts!</p>}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
            
            // Main Render
            return (
                <div className="min-h-screen overflow-x-hidden">
                    <LiveWallpaper wallpaperTheme={wallpaperTheme} />
                    <div className="relative z-10">
                        <Navigation />
                        <main>
                            {currentPage === 'home' && <HomePage />}
                            {currentPage === 'optimize' && <OptimizePage />}
                            {currentPage === 'templates' && <TemplatesPage />}
                            {currentPage === 'analytics' && <AnalyticsPage />}
                        </main>
                        <WallpaperPicker />
                        <SettingsModal />
                        <ChatPanel />
                        <NotificationToast />
                        
                        <footer className="glass-morphism-strong mt-12 py-6">
                            <div className="container mx-auto px-4 text-center text-slate-400 text-sm">
                                <p>© 2026 Prompt AI Optimizer | build by Neelimapasala |Professional Prompt Engineering Tool | All Rights Reserved</p>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
